services:
  tocodex-relay:
    build: .
    image: tocodex-api-server:latest
    container_name: tocodex-relay
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8787}:8787"
    environment:
      # --- ToCodex signing configuration ---------------------------------
      TOCODEX_API_URL: ${TOCODEX_API_URL:-https://api.tocodex.com}
      TOCODEX_HMAC_SECRET: ${TOCODEX_HMAC_SECRET:-tc-hmac-s3cr3t-k3y-2026-tocodex-platform}
      TOCODEX_API_KEY: ${TOCODEX_API_KEY:-}
      TOCODEX_SIGNED_PATHS: ${TOCODEX_SIGNED_PATHS:-/v1/chat/completions}
      TOCODEX_SIGN_ALL_PATHS: ${TOCODEX_SIGN_ALL_PATHS:-false}
      # Leave TOCODEX_APP_VERSION unset so version-probe pulls the live
      # value from the VSCode Marketplace.  Set explicitly to pin.
      TOCODEX_APP_VERSION: ${TOCODEX_APP_VERSION:-}
      TOCODEX_DEFAULT_MODEL: ${TOCODEX_DEFAULT_MODEL:-}
      # --- Electron sidecar (TLS impersonation) --------------------------
      # Set to "1" to skip the Electron BoringSSL transport — the relay
      # then leaks Node OpenSSL JA3.  Useful for local debugging only.
      TOCODEX_DISABLE_SIDECAR: ${TOCODEX_DISABLE_SIDECAR:-}
      # --- Responses session store (in-memory LRU + TTL) -----------------
      RESPONSES_SESSION_TTL_MS: ${RESPONSES_SESSION_TTL_MS:-1800000}
      RESPONSES_SESSION_MAX: ${RESPONSES_SESSION_MAX:-500}
      # --- Listener ------------------------------------------------------
      LISTEN_HOST: 0.0.0.0
      PORT: 8787
      HEALTH_PATH: ${HEALTH_PATH:-/_health}
      UPSTREAM_TIMEOUT_MS: ${UPSTREAM_TIMEOUT_MS:-600000}
      # --- CORS ----------------------------------------------------------
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-*}
      CORS_ALLOW_HEADERS: ${CORS_ALLOW_HEADERS:-Content-Type, Authorization}
      CORS_ALLOW_METHODS: ${CORS_ALLOW_METHODS:-GET,POST,PUT,PATCH,DELETE,OPTIONS}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||8787)+'/_health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
